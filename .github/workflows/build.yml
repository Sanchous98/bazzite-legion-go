name: build-image

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
  workflow_dispatch:
    inputs:
      march:
        description: "-march target for rebuild-пакетов"
        required: false
        default: x86-64-v4
        type: choice
        options:
          - x86-64-v3
          - x86-64-v4

env:
  IMAGE_NAME: bazzite-legion-go
  BASE_IMAGE: ghcr.io/ublue-os/bazzite-deck
  BASE_TAG: stable

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Resolve paths
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REGISTRY="ghcr.io/${OWNER}"
          echo "image_owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "imagокe_registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image_full=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Resolve march
        id: march
        run: |
          # Default = v4 (target — Legion Go Zen 4 с AVX-512). dispatch.sh сам
          # читает /proc/cpuinfo: если у runner'а нет AVX-512 (GHA EPYC или
          # N100 Alder Lake-N) — уводит сборку под qemu-x86_64-static -cpu max
          # (30-60 мин вместо 5).
          MARCH="${{ github.event.inputs.march || 'x86-64-v4' }}"
          echo "march=${MARCH}" >> "$GITHUB_OUTPUT"

      - name: Generate tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          IMG="${{ steps.vars.outputs.image_full }}"
          {
            echo "tags<<EOF"
            echo "${IMG}:latest"
            echo "${IMG}:stable"
            echo "${IMG}:${DATE}"
            echo "${IMG}:${SHA_SHORT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Buildx нужен для build-push-action. На self-hosted использует docker.sock
      # (mount из compose), buildkit поднимется в эфемерном контейнере.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BASE_TAG=${{ env.BASE_TAG }}
            IMAGE_OWNER=${{ steps.vars.outputs.image_owner }}
            IMAGE_NAME=${{ env.IMAGE_NAME }}
            IMAGE_TAG=stable
            MARCH=${{ steps.march.outputs.march }}
          # OCI-формат для ostree-совместимости bootc/rpm-ostree.
          outputs: type=image,oci-mediatypes=true
          provenance: false

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ${{ steps.vars.outputs.image_full }}
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ""
        run: |
          if [ -n "$COSIGN_PRIVATE_KEY" ]; then
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMG}@${DIGEST}"
          else
            echo "SIGNING_SECRET not set — skipping cosign signing"
          fi
