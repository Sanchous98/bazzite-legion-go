name: build-iso

# ISO собирается из уже опубликованного в GHCR образа.
# Гоняется на self-hosted runner (N100, метка iso-builder) — там же раздача
# через nginx file-server: публикуем только CHECKSUM в GH Release, ISO сам
# остаётся локально и отдаётся по vars.ISO_BASE_URL.
#
# PR не триггерит этот workflow (security: public repo + self-hosted runner —
# нельзя пускать чужой код из форков). workflow_dispatch / schedule safe.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build ISO from"
        required: false
        default: "stable"
  schedule:
    # Раз в месяц, 1-го числа
    - cron: "0 8 1 * *"

env:
  IMAGE_NAME: bazzite-legion-go
  FEDORA_VERSION: "43"

concurrency:
  group: iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iso:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Resolve paths
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          TAG="${{ github.event.inputs.tag || 'stable' }}"
          STAMP="${TAG}-$(date +%Y%m%d)"
          echo "image_repo=ghcr.io/${OWNER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "iso_name=${IMAGE_NAME}-${STAMP}.iso" >> "$GITHUB_OUTPUT"
          echo "release_tag=iso-${STAMP}" >> "$GITHUB_OUTPUT"

      # Prep для build ISO:
      #  - Чистим /cache (action делает `sudo mkdir /cache` без -p, падает
      #    на persistent state self-hosted runner'а).
      #  - Симлинк $GITHUB_WORKSPACE/iso-out → /srv/iso. Action монтирует
      #    workspace в /github/workspace; пишет в `iso_name` который мы
      #    укажем как `iso-out/<name>.iso` → через mount → через symlink →
      #    сразу в /srv/iso. Никакого cp/mv 10 ГБ файла.
      - name: Prepare output & cleanup
        run: |
          sudo rm -rf /cache /dnf-cache /skopeo-cache || true
          sudo mkdir -p "${ISO_SERVE_DIR}"
          sudo chown "$(id -u):$(id -g)" "${ISO_SERVE_DIR}"
          ln -sfn "${ISO_SERVE_DIR}" "${GITHUB_WORKSPACE}/iso-out"

      # Jasonn3/build-container-installer (Lorax) — тот же pin, что у upstream
      # Bazzite (v1.4.0). bootc-image-builder регрессировал на dnf5/F43.
      - name: Build ISO
        id: build
        uses: jasonn3/build-container-installer@c9ef3de33236e66781ec37bd0485e8009eaefe24
        with:
          arch: x86_64
          image_name: ${{ env.IMAGE_NAME }}
          image_repo: ${{ steps.vars.outputs.image_repo }}
          image_tag: ${{ steps.vars.outputs.image_tag }}
          version: ${{ env.FEDORA_VERSION }}
          variant: Kinoite
          # Путь ведёт через symlink iso-out/ → /srv/iso. Action пишет
          # напрямую в раздаваемую папку, без post-step copy.
          iso_name: iso-out/${{ steps.vars.outputs.iso_name }}
          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"
          enable_flatpak_dependencies: "false"
          enrollment_password: "universalblue"

      # Пост-оформление: chmod + latest-симлинки. Сам файл уже в /srv/iso.
      - name: Finalize ISO
        run: |
          set -euxo pipefail
          ISO_NAME="${{ steps.vars.outputs.iso_name }}"
          chmod 644 "${ISO_SERVE_DIR}/${ISO_NAME}" \
                    "${ISO_SERVE_DIR}/${ISO_NAME}-CHECKSUM"
          ln -sfn "${ISO_NAME}" \
                  "${ISO_SERVE_DIR}/${{ env.IMAGE_NAME }}-latest.iso"
          ln -sfn "${ISO_NAME}-CHECKSUM" \
                  "${ISO_SERVE_DIR}/${{ env.IMAGE_NAME }}-latest.iso-CHECKSUM"

      # GH Release только с CHECKSUM (мал) и ссылками на self-hosted URL.
      # Сам ISO в Release не грузим — обход 2 GiB limit + экономия GHA bandwidth.
      - name: Publish GitHub Release (checksum + links)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          name: ${{ env.IMAGE_NAME }} ${{ steps.vars.outputs.release_tag }}
          body: |
            Installation ISO for **${{ steps.vars.outputs.image_repo }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}**.

            ## Download

            - **Latest**: ${{ vars.ISO_BASE_URL }}/${{ env.IMAGE_NAME }}-latest.iso
            - **This build**: ${{ vars.ISO_BASE_URL }}/${{ steps.build.outputs.iso_name }}
            - **Checksum**: ${{ vars.ISO_BASE_URL }}/${{ steps.build.outputs.iso_name }}-CHECKSUM

            ## Verify

            ```bash
            curl -LO ${{ vars.ISO_BASE_URL }}/${{ steps.build.outputs.iso_name }}
            curl -LO ${{ vars.ISO_BASE_URL }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
            sha256sum -c ${{ steps.build.outputs.iso_name }}-CHECKSUM
            ```

            ---
            Generated by workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          files: |
            ${{ env.ISO_SERVE_DIR }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          make_latest: "true"
          fail_on_unmatched_files: true
